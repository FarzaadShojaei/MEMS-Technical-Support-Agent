name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app scripts tests

      - name: Tests
        run: pytest -q

  # Phase 3 will add an `eval` job here that runs the golden-set harness
  # and fails the build if quality metrics drop below threshold.
